    <circle cx="21.19" cy="51.84" r="3.6" fill="#2b5ccd" stroke="#1c3c8c" stroke-width="0.8"/>
    <circle cx="78.81" cy="51.84" r="3.6" fill="#2b5ccd" stroke="#1c3c8c" stroke-width="0.8"/>
