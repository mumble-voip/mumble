# MUMBLE-TFAR
# Builds the Windows client (integrated TFAR compatibility layer) and the Linux
# server (TFAR extensions) and publishes them as a GitHub release.
#
# Trigger:
#   * pushing a tag "v*" (e.g. v1.0.0)  -> builds and creates/updates the release
#   * manual dispatch                    -> builds and uploads workflow artifacts only

name: Release (TFAR)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  # Same option set as build.yml, but without tests (release build).
  CMAKE_OPTIONS: -Dtests=OFF -Dsymbols=ON -Ddisplay-install-paths=ON -Dtest-lto=OFF -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache

jobs:
  build-windows-client:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Set environment variables
        run: $GITHUB_WORKSPACE/.github/workflows/set_environment_variables.sh "windows-2025-vs2026" "static" "x86_64" "${{ github.workspace }}"
        shell: bash

      - uses: actions/cache/restore@v5
        with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: release-tfar.windows-2025-vs2026.static
          append-timestamp: false

      - uses: ./.github/actions/install-dependencies
        with:
          type: static
          os: windows-2025-vs2026
          arch: x86_64

      - name: Build
        run: ./.github/workflows/build.sh "windows-2025-vs2026" "static" "x86_64"
        shell: bash
        env:
          # No access to the upstream build number server on this fork.
          MUMBLE_BUILD_NUMBER: 0

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          $stage = "mumble-tfar-portable"
          New-Item -ItemType Directory -Path $stage | Out-Null

          Copy-Item build/mumble.exe $stage/
          # DLLs that ship alongside the static client build (if present)
          foreach ($f in @("speexdsp.dll", "rnnoise.dll")) {
            if (Test-Path "build/$f") { Copy-Item "build/$f" $stage/ }
          }
          # TFAR radio sounds (copied next to mumble.exe by the build)
          Copy-Item -Recurse build/tfar $stage/tfar
          Copy-Item README.md $stage/
          New-Item -ItemType Directory -Path $stage/docs | Out-Null
          Copy-Item docs/TFAR-SETUP.md $stage/docs/

          Compress-Archive -Path "$stage/*" -DestinationPath "mumble-tfar-$ref-win64-portable.zip"

      - name: Package MSIX (Microsoft Store)
        shell: pwsh
        env:
          # Must match the app identity from Microsoft Partner Center
          # ("Product identity" page). Override via repository variables.
          MSIX_IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME || 'StormOfTheGalaxy.MumbleTFAR' }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER || 'CN=StormOfTheGalaxy' }}
        run: |
          $ref = "${{ github.ref_name }}"
          # MSIX version: strip leading "v", pad to 4 components (revision must be 0 for Store)
          $ver = $ref -replace '^v', ''
          if ($ver -notmatch '^\d+(\.\d+){0,3}$') { $ver = '1.0.0' }
          while (($ver.Split('.')).Count -lt 4) { $ver = "$ver.0" }

          $stage = "msix-layout"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item build/mumble.exe $stage/
          foreach ($f in @("speexdsp.dll", "rnnoise.dll")) {
            if (Test-Path "build/$f") { Copy-Item "build/$f" $stage/ }
          }
          Copy-Item -Recurse build/tfar $stage/tfar
          Copy-Item -Recurse installer/msix/Assets $stage/Assets
          # License texts — required for compliant distribution (BSD, LGPL, APL-SA, ...)
          New-Item -ItemType Directory -Path $stage/licenses | Out-Null
          Copy-Item LICENSE $stage/licenses/Mumble-LICENSE.txt
          Copy-Item installer/gpl.txt, installer/lgpl.txt, installer/speex.txt, installer/qt.txt $stage/licenses/
          if (Test-Path THIRD-PARTY-TFAR.md) { Copy-Item THIRD-PARTY-TFAR.md $stage/licenses/ }

          (Get-Content installer/msix/AppxManifest.xml.in) `
            -replace '@VERSION@', $ver `
            -replace '@IDENTITY_NAME@', $env:MSIX_IDENTITY_NAME `
            -replace '@PUBLISHER@', $env:MSIX_PUBLISHER `
            | Set-Content "$stage/AppxManifest.xml" -Encoding utf8

          # Locate makeappx.exe in the installed Windows SDK
          $makeappx = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\makeappx.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          & $makeappx.FullName pack /d $stage /p "mumble-tfar-$ref-win64.msix" /o
          # Unsigned on purpose: the Microsoft Store signs the package during
          # submission. For local sideloading sign with signtool + your cert.

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp mumble-tfar-*-win64-portable.zip release-artifacts/
          cp mumble-tfar-*-win64.msix release-artifacts/ || true
          # MSI installer + bootstrapper EXE produced by the WixSharp packaging step
          find build -name 'mumble_client-*.msi' -exec cp {} release-artifacts/ \;
          find build -name 'mumble_client-*.exe' -exec cp {} release-artifacts/ \;
          ls -la release-artifacts

      - uses: actions/upload-artifact@v7
        with:
          name: mumble-tfar-windows
          compression-level: 9
          path: release-artifacts/*

      - name: Save environment cache
        uses: actions/cache/save@v5
        with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

  build-linux-server:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Set environment variables
        run: $GITHUB_WORKSPACE/.github/workflows/set_environment_variables.sh "ubuntu-24.04" "static" "x86_64" "${{ github.workspace }}"
        shell: bash

      - uses: actions/cache/restore@v5
        with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: release-tfar.ubuntu-24.04.static
          append-timestamp: false

      - uses: ./.github/actions/install-dependencies
        with:
          type: static
          os: ubuntu-24.04
          arch: x86_64

      - name: Build
        run: ./.github/workflows/build.sh "ubuntu-24.04" "static" "x86_64"
        shell: bash
        env:
          MUMBLE_BUILD_NUMBER: 0

      - name: Package server tarball
        shell: bash
        run: |
          ref="${{ github.ref_name }}"
          stage="mumble-tfar-server"
          mkdir -p "$stage"
          cp build/mumble-server "$stage/"
          cp auxiliary_files/mumble-server.ini "$stage/"
          cp docs/TFAR-SETUP.md "$stage/"
          tar -czf "mumble-tfar-server-$ref-linux-x86_64.tar.gz" "$stage"

          mkdir -p release-artifacts
          cp mumble-tfar-server-*.tar.gz release-artifacts/
          ls -la release-artifacts

      - uses: actions/upload-artifact@v7
        with:
          name: mumble-tfar-server
          compression-level: 0
          path: release-artifacts/*

      - name: Save environment cache
        uses: actions/cache/save@v5
        with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

  publish:
    needs: [ build-windows-client, build-linux-server ]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: 'mumble-tfar ${{ github.ref_name }}'
          files: release-artifacts/*
          generate_release_notes: true
          body: |
            Mumble со встроенной поддержкой TFAR (Task Force Arrowhead Radio) —
            drop-in замена связки TeamSpeak 3 + TFAR-плагин для Arma 3.

            **Клиент (Windows):**
            - `mumble_client-*.msi` / `mumble_client-*.exe` — установщик (радио-звуки включены);
            - `mumble-tfar-*-win64-portable.zip` — портативная версия: распаковать и запустить `mumble.exe`;
            - `mumble-tfar-*-win64.msix` — пакет для Microsoft Store (неподписанный,
              Store подписывает при публикации; распространение только бесплатное — APL-SA).

            **Сервер (Linux):**
            - `mumble-tfar-server-*-linux-x86_64.tar.gz` — murmur с TFAR-расширениями
              (канальная рассылка радио-команд, серверный кэш состояния, без рейт-лимитов
              на радио-трафик). Опция `tfarsupport=true` в `mumble-server.ini` (по умолчанию включена).
              Обычный сервер Mumble ≥ 1.4 тоже работает (режим совместимости).

            Мод TFAR в Arma 3 используется без изменений, TS3-плагин устанавливать не нужно.
            Подробности — в `docs/TFAR-SETUP.md`.
