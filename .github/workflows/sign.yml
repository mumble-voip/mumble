name: Build and Sign Windows Executable

on: workflow_dispatch

env:
  BUILD_TYPE: Release
  CMAKE_OPTIONS: -Dtests=OFF -Dsymbols=ON -Ddisplay-install-paths=ON -Dtest-lto=OFF

jobs:

  fetch_build_number:
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.fetch.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
            fetch-depth: 1
      - id: fetch
        shell: bash
        run: |
          build_version="$("${{ github.workspace }}/scripts/mumble-version.py")"
          build_number="$("${{ github.workspace }}/scripts/mumble-build-number.py" \
            --commit "${{ github.sha }}" --version "${build_version}" \
            --password "${{ secrets.BUILD_NUMBER_TOKEN }}" --default 0)"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"

  build:
    needs: [ fetch_build_number ]

    strategy:
        fail-fast: false
        matrix:
            os: [windows-2022]
            type: [static]
            arch: [x86_64]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
          submodules: 'recursive'
          fetch-depth: 1

    - name: Set environment variables
      run: $GITHUB_WORKSPACE/.github/workflows/set_environment_variables.sh "${{ matrix.os }}" "${{ matrix.type }}" "${{ matrix.arch }}" "${{ github.workspace }}"
      shell: bash

    - uses: actions/cache@v4
      with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

    - uses: ./.github/actions/install-dependencies
      with:
          type: ${{ matrix.type }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

    - name: Build Unsigned Artifacts
      run: ./.github/workflows/build.sh "${{ matrix.os }}" "${{ matrix.type }}" "${{ matrix.arch }}"
      shell: bash
      env:
          MUMBLE_BUILD_NUMBER: ${{ needs.fetch_build_number.outputs.build_number }}
          MUMBLE_SKIP_MSI_REBUILD: OFF

    - name: Publish Unsigned MSI Artifacts
      id: upload-unsigned-artifact
      uses: actions/upload-artifact@v4
      with:
        name: 'intermediate-msi'
        compression-level: 9
        path: |
          build\installer\client\*client*.msi
          build\installer\server\*server*.msi

    - name: Delete Unsigned MSI Files
      run: |
        rm build\installer\server\*server*.msi
        rm build\installer\client\*client*.msi

    - name: Create Download Directory
      run: mkdir download

    - name: Submit MSI Signing Request to SignPath
      id: submit-msi-signing-request
      uses: signpath/github-action-submit-signing-request@v1.1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: '79916aba-7a9f-448d-91c6-fb83593b59d3'
        project-slug: 'mumble'
        signing-policy-slug: 'release-signing'
        artifact-configuration-slug: 'sign-msi'
        github-artifact-id: ${{ steps.upload-unsigned-artifact.outputs.artifact-id }}
        wait-for-completion: true
        output-artifact-directory: 'download\'

    - name: Copy Signed MSI Artifacts
      run: |
        cp download\server\*server*.msi build\installer\server
        cp download\client\*client*.msi build\installer\client

    - name: Build Unsigned Burn Engine
      run: ./.github/workflows/build.sh "${{ matrix.os }}" "${{ matrix.type }}" "${{ matrix.arch }}"
      shell: bash
      env:
          MUMBLE_BUILD_NUMBER: ${{ needs.fetch_build_number.outputs.build_number }}
          MUMBLE_SKIP_MSI_REBUILD: ON

    - name: Extract Client Burn Engine
      shell: pwsh
      run: |
        $file = Get-ChildItem -Path 'build\installer\client\' -Filter '*_client-*.exe' | ForEach-Object { $_.FullName }
        & "c:\Program Files (x86)\WiX Toolset v3.14\bin\insignia.exe" -ib $file -o build\installer\client\mumble_client.exe

    - name: Extract Server Burn Engine
      shell: pwsh
      run: |
        $file = Get-ChildItem -Path 'build\installer\server\' -Filter '*_server-*.exe' | ForEach-Object { $_.FullName }
        & "c:\Program Files (x86)\WiX Toolset v3.14\bin\insignia.exe" -ib $file -o build\installer\server\mumble_server.exe

    - name: Publish Unsigned Burn Engine
      id: upload-unsigned-burn-engine
      uses: actions/upload-artifact@v4
      with:
        name: 'intermediate-burn-engine'
        compression-level: 9
        path: |
          build\installer\client\mumble_client.exe
          build\installer\server\mumble_server.exe

    - name: Delete Unsigned Burn Engine
      run: |
        rm build\installer\client\mumble_client.exe
        rm build\installer\server\mumble_server.exe

    - name: Submit Burn Engine Signing Request to SignPath
      id: submit-burn-engine-signing-request
      uses: signpath/github-action-submit-signing-request@v1.1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: '79916aba-7a9f-448d-91c6-fb83593b59d3'
        project-slug: 'mumble'
        signing-policy-slug: 'release-signing'
        artifact-configuration-slug: 'sign-engine'
        github-artifact-id: ${{ steps.upload-unsigned-burn-engine.outputs.artifact-id }}
        wait-for-completion: true
        output-artifact-directory: 'download\'

    - name: Copy Signed Burn Engine
      run: |
        cp download\client\mumble_client.exe build\installer\client
        cp download\server\mumble_server.exe build\installer\server

    - name: Re-Introduce Client Burn Engine into Bundle
      shell: pwsh
      run: |
        $file = Get-ChildItem -Path 'build\installer\client\' -Filter '*_client-*.exe' | ForEach-Object { $_.FullName }
        & "c:\Program Files (x86)\WiX Toolset v3.14\bin\insignia.exe" -ab build\installer\client\mumble_client.exe $file -o $file

    - name: Re-Introduce Server Burn Engine into Bundle
      shell: pwsh
      run: |
        $file = Get-ChildItem -Path 'build\installer\server\' -Filter '*_server-*.exe' | ForEach-Object { $_.FullName }
        & "c:\Program Files (x86)\WiX Toolset v3.14\bin\insignia.exe" -ab build\installer\server\mumble_server.exe $file -o $file

    - name: Delete Remaining Burn Engine Files
      run: |
        rm build\installer\client\mumble_client.exe
        rm build\installer\server\mumble_server.exe

    - name: Publish Unsigned Bundle
      id: upload-unsigned-bundle
      uses: actions/upload-artifact@v4
      with:
        name: 'Mumble-${{ matrix.os }}'
        compression-level: 9
        path: |
          build\**\*client*.exe
          build\**\*client*.msi
          build\**\*server*.exe
          build\**\*server*.msi
          build\**\plugins\*.dll
          build\**\plugins\*.pdb
          build\**\link_tester.*
          build\**\mumble.exe
          build\**\mumble.pdb
          build\**\mumble-g15*.*
          build\**\mumble_ol*.exe
          build\**\mumble_ol*.pdb
          build\**\mumble-server.exe
          build\**\mumble-server.pdb
          build\**\rnnoise.exe
          build\**\rnnoise.pdb
          build\**\speexdsp.exe
          build\**\speexdsp.pdb

    - name: Submit Bundle Signing Request to SignPath
      id: submit-bundle-signing-request
      uses: signpath/github-action-submit-signing-request@v1.1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: '79916aba-7a9f-448d-91c6-fb83593b59d3'
        project-slug: 'mumble'
        signing-policy-slug: 'release-signing'
        artifact-configuration-slug: 'sign-bundle'
        github-artifact-id: ${{ steps.upload-unsigned-bundle.outputs.artifact-id }}
        wait-for-completion: true
