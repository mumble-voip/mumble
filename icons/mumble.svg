<?xml version="1.0" encoding="UTF-8"?>
<!-- MUMBLE-TFAR: Storm of The Galaxy emblem (clone-trooper helmet, 501st blue).
     Generated to match scripts/generate-branding.py — keep the two in sync. -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1b3a"/>
      <stop offset="1" stop-color="#070e20"/>
