name: Build and Sign Windows executable

on: [workflow_dispatch, push, pull_request]

env:
  BUILD_TYPE: Release
  CMAKE_OPTIONS: -Dtests=OFF -Dsymbols=ON -Ddisplay-install-paths=ON -Dtest-lto=OFF

jobs:

  fetch_build_number:
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.fetch.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
            fetch-depth: 1
      - id: fetch
        shell: bash
        run: |
          build_version="$("${{ github.workspace }}/scripts/mumble-version.py")"
          build_number="$("${{ github.workspace }}/scripts/mumble-build-number.py" \
            --commit "${{ github.sha }}" --version "${build_version}" \
            --password "${{ secrets.BUILD_NUMBER_TOKEN }}" --default 0)"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"

  build:
    needs: [ fetch_build_number ]

    strategy:
        fail-fast: false
        matrix:
            os: [windows-2022]
            type: [static]
            arch: [x86_64]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
          submodules: 'recursive'
          fetch-depth: 1

    - name: Set environment variables
      run: $GITHUB_WORKSPACE/.github/workflows/set_environment_variables.sh "${{ matrix.os }}" "${{ matrix.type }}" "${{ matrix.arch }}" "${{ github.workspace }}"
      shell: bash

    - uses: actions/cache@v4
      with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

    - uses: ./.github/actions/install-dependencies
      with:
          type: ${{ matrix.type }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

    - name: Build unsigned artifacts
      run: ./.github/workflows/build.sh "${{ matrix.os }}" "${{ matrix.type }}" "${{ matrix.arch }}"
      shell: bash
      env:
          MUMBLE_BUILD_NUMBER: ${{ needs.fetch_build_number.outputs.build_number }}
          MUMBLE_SKIP_MSI_REBUILD: OFF

    - name: Publish unsigned artifact
      id: upload-unsigned-artifact
      uses: actions/upload-artifact@v4
      with:
        name: 'intermediate-artifact'
        compression-level: 9
        path: |
          build\installer\client\*client*.msi
          build\installer\server\*server*.msi

    - name: List client contents
      run: dir build\installer\client
      continue-on-error: true

    - name: List server contents
      run: dir build\installer\server
      continue-on-error: true

    - name: Delete unsigned server MSI files
      run: rm build\installer\server\*server*.msi

    - name: Delete unsigned client MSI files
      run: rm build\installer\client\*client*.msi

    - name: Create download directory
      run: mkdir download

    - name: Submit MSI signing request to SignPath
      id: submit-signing-request
      uses: signpath/github-action-submit-signing-request@v1.1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: '79916aba-7a9f-448d-91c6-fb83593b59d3'
        project-slug: 'mumble'
        signing-policy-slug: 'release-signing'
        artifact-configuration-slug: 'sign-msi'
        github-artifact-id: ${{ steps.upload-unsigned-artifact.outputs.artifact-id }}
        wait-for-completion: true
        output-artifact-directory: 'download\'

    - name: List client contents
      run: dir download
      continue-on-error: true

    - name: List server contents
      run: dir download\server
      continue-on-error: true

    - name: Copy signed server artifact
      run: cp download\server\*server*.msi build\installer\server

    - name: Copy signed client artifact
      run: cp download\client\*client*.msi build\installer\client

    - name: List client contents
      run: dir build\installer\client
      continue-on-error: true

    - name: List server contents
      run: dir build\installer\server
      continue-on-error: true

    - name: Build bundle
      run: ./.github/workflows/build.sh "${{ matrix.os }}" "${{ matrix.type }}" "${{ matrix.arch }}"
      shell: bash
      env:
          MUMBLE_BUILD_NUMBER: ${{ needs.fetch_build_number.outputs.build_number }}
          MUMBLE_SKIP_MSI_REBUILD: ON

    - name: List WixToolset contents
      run: dir c:\Program Files (x86)\WiX Toolset v3.14\bin
      continue-on-error: true

    - name: Try insignia 1
      run: c:\Program Files (x86)\WiX Toolset v3.14\bin\insignia.exe --help
      continue-on-error: true

    - name: Try insignia 2
      run: insignia.exe --help
      continue-on-error: true

    - name: Try insignia 3
      run: insignia --help
      continue-on-error: true

    - name: Extract Client Burn Engine
      run: c:\Program Files (x86)\WiX Toolset v3.14\bin\insignia.exe -ib build\installer\client\*client*.exe -o build\installer\client\engine.exe

    - name: Extract Server Burn Engine
      run: c:\Program Files (x86)\WiX Toolset v3.14\bin\insignia.exe -ib build\installer\server\*server*.exe -o build\installer\server\engine.exe

    - name: Publish Burn Engine
      id: upload-unsigned-burn-engine
      uses: actions/upload-artifact@v4
      with:
        name: 'intermediate-burn-engine'
        compression-level: 9
        path: |
          build\installer\**\engine.exe

    - name: Delete unsigned server Burn Engine
      run: rm build\installer\server\engine.exe

    - name: Delete unsigned client Burn Engine
      run: rm build\installer\client\engine.exe

    - name: Submit burn engine signing request to SignPath
      id: submit-burn-engine-signing-request
      uses: signpath/github-action-submit-signing-request@v1.1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: '79916aba-7a9f-448d-91c6-fb83593b59d3'
        project-slug: 'mumble'
        signing-policy-slug: 'release-signing'
        artifact-configuration-slug: 'sign-engine'
        github-artifact-id: ${{ steps.upload-unsigned-burn-engine.outputs.artifact-id }}
        wait-for-completion: true
        output-artifact-directory: 'download\'

    - name: Copy signed server burn engine
      run: cp download\server\engine.exe build\installer\server

    - name: Copy signed client burn engine
      run: cp download\client\engine.exe build\installer\client

    - name: Re-Introduce Client Burn Engine into Bundle
      run: c:\Program Files (x86)\WiX Toolset v3.14\bin\insignia.exe -ab build\installer\client\engine.exe build\installer\client\*client*.exe -o build\installer\client\*client*.exe

    - name: Re-Introduce Server Burn Engine into Bundle
      run: c:\Program Files (x86)\WiX Toolset v3.14\bin\insignia.exe -ab build\installer\server\engine.exe build\installer\server\*server*.exe -o build\installer\server\*server*.exe

    - name: Delete server Burn Engine
      run: rm build\installer\server\engine.exe

    - name: Delete client Burn Engine
      run: rm build\installer\client\engine.exe

    - name: Publish bundle
      id: upload-unsigned-bundle
      uses: actions/upload-artifact@v4
      with:
        name: 'Mumble-${{ matrix.os }}'
        compression-level: 9
        path: |
          build\**\*client*.exe
          build\**\*client*.msi
          build\**\*server*.exe
          build\**\*server*.msi
          build\**\plugins\*.dll
          build\**\plugins\*.pdb
          build\**\link_tester.*
          build\**\mumble.exe
          build\**\mumble.pdb
          build\**\mumble-g15*.*
          build\**\mumble_ol*.exe
          build\**\mumble_ol*.pdb
          build\**\mumble-server.exe
          build\**\mumble-server.pdb
          build\**\rnnoise.exe
          build\**\rnnoise.pdb
          build\**\speexdsp.exe
          build\**\speexdsp.pdb

    - name: Submit bundle signing request to SignPath
      id: submit-bundle-signing-request
      uses: signpath/github-action-submit-signing-request@v1.1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: '79916aba-7a9f-448d-91c6-fb83593b59d3'
        project-slug: 'mumble'
        signing-policy-slug: 'release-signing'
        artifact-configuration-slug: 'sign-bundle'
        github-artifact-id: ${{ steps.upload-unsigned-bundle.outputs.artifact-id }}
        wait-for-completion: true
